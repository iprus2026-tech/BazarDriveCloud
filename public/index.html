<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FF6B35">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'none'; object-src 'none'; form-action 'none';">
  <title>BazarDrive</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles/cloud.css">
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
</head>
<body>
  <div id="app" role="main"></div>
  <nav id="tabbar" class="tabbar" aria-label="Основная навигация" hidden>
    <button class="tab" data-route="/feed" type="button">
      <span class="tab__icon" aria-hidden="true">⌂</span>
      <span class="tab__label">Лента</span>
    </button>
    <button class="tab" data-route="/rules" type="button">
      <span class="tab__icon" aria-hidden="true">§</span>
      <span class="tab__label">Правила</span>
    </button>
    <button class="tab tab--cta" data-action="create-post" type="button">
      <span class="tab__icon" aria-hidden="true">+</span>
      <span class="tab__label">Объявление</span>
    </button>
    <button class="tab" data-route="/profile" type="button">
      <span class="tab__icon" aria-hidden="true">◉</span>
      <span class="tab__label">Профиль</span>
    </button>
  </nav>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
